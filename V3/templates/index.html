<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bicycle Robot Dashboard</title>
  <style>
    body { font-family: Arial; text-align: center; background: #111; color: white; }
    button { padding: 15px 25px; margin: 10px; font-size: 18px; width: 180px; }
    .auto { background: #0a0; }
    .manual { background: #0066cc; }
    img { width: 90%; max-width: 800px; border: 3px solid #0ff; margin: 20px 0; }
  </style>
</head>
<body>
  <h1>🚲 Bicycle Robot Dashboard</h1>

  <h2>Live Camera</h2>
  <img src="/video_feed">

  <h2>Obstacle Avoidance Navigation</h2>
  <button class="auto" onclick="fetch('/start_auto')">START Auto Avoidance</button>
  <button class="auto" onclick="fetch('/stop_auto')">STOP Auto</button>

  <h2>Manual Control</h2>
  <div class="manual">
    <button onclick="send('STRAIGHT')">Straight (Forward)</button>
    <button onclick="send('BACKWARD')">Backward</button>
    <button onclick="send('STOP')">STOP</button><br>
    <button onclick="send('LEFT')">← Left</button>
    <button onclick="send('RIGHT')">Right →</button>
  </div>

  <script>
    function send(cmd) {
      fetch(`/command/${cmd}`);
    }
  </script>
</body>
</html>
